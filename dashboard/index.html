<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sandboxing Patterns for AI Runtimes</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>mermaid.initialize({ startOnLoad: false, theme: 'dark', themeVariables: { primaryColor: '#1e2530', primaryTextColor: '#c8cdd5', primaryBorderColor: '#2e3640', lineColor: '#4a5568', fontSize: '11px', fontFamily: 'SF Mono, Menlo, monospace' } });</script>
<style>
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; background: #0d1117; color: #c9d1d9; font: 13px/1.5 'SF Mono', Menlo, Consolas, monospace; }

  header {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 20px; border-bottom: 1px solid #21262d;
  }
  header .brand { flex: 1; }
  header h1 { font-size: 14px; font-weight: 600; color: #e6edf3; }
  header .tagline { font-size: 11px; color: #8b949e; margin-top: 1px; }
  .secret-banner {
    font-size: 11px; padding: 4px 10px; border-radius: 4px;
    background: #1c1210; border: 1px solid #3d1518; color: #f85149;
  }
  .secret-banner code { color: #f0883e; }
  button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 6px 14px; border-radius: 6px; font: inherit; cursor: pointer; }
  button:hover { border-color: #58a6ff; }
  button.primary { background: #238636; color: #fff; border-color: #238636; font-weight: 600; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  main { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #21262d; height: calc(100vh - 49px); }

  .col { background: #0d1117; display: flex; flex-direction: column; min-width: 0; overflow: hidden; border-top: 3px solid #30363d; }
  .col[data-pattern="a"] { border-top-color: #f85149; }
  .col[data-pattern="b"] { border-top-color: #d29922; }
  .col[data-pattern="c"] { border-top-color: #3fb950; }

  .col-head { padding: 12px 16px; border-bottom: 1px solid #21262d; }
  .col-head .top { display: flex; align-items: center; gap: 10px; }
  .col-head .info { flex: 1; }
  .col-head h2 { font-size: 15px; font-weight: 700; color: #e6edf3; }
  .col-head .sub { font-size: 11px; color: #8b949e; margin-top: 2px; }
  .col-head .file { display: inline-block; font-size: 11px; color: #58a6ff; margin-top: 4px; padding: 1px 6px; background: #0d1117; border: 1px solid #21262d; border-radius: 3px; }
  .controls { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; border: 1px solid #30363d; color: #8b949e; font-weight: 600; text-transform: uppercase; }
  .badge.running { color: #58a6ff; border-color: #58a6ff; animation: pulse 1.2s ease-in-out infinite; }
  .badge.done { color: #3fb950; border-color: #3fb950; }
  .badge.error { color: #f85149; border-color: #f85149; }
  @keyframes pulse { 50% { opacity: 0.4; } }

  /* --- Collapsible arch diagram --- */
  .arch-toggle {
    display: flex; align-items: center; gap: 6px; padding: 6px 16px;
    border-bottom: 1px solid #21262d; cursor: pointer; user-select: none;
    font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .arch-toggle:hover { color: #c9d1d9; }
  .arch-toggle .arrow { transition: transform 0.2s; font-size: 8px; }
  .arch-toggle .arrow.open { transform: rotate(90deg); }
  .arch-container { overflow: hidden; transition: max-height 0.3s ease; border-bottom: 1px solid #21262d; background: #010409; }
  .arch-container.collapsed { max-height: 0 !important; border-bottom: none; }
  .arch-container .arch-inner {
    height: 120px; display: flex; align-items: center; justify-content: center;
    padding: 8px 12px; overflow: hidden;
  }
  .arch-container .arch-inner svg { max-width: 100%; max-height: 100%; }

  .diff-summary { padding: 6px 16px; font-size: 11px; border-bottom: 1px solid #21262d; color: #8b949e; }
  .diff-summary .added { color: #3fb950; }
  .diff-summary .removed { color: #f85149; }

  .owasp { padding: 6px 16px; border-bottom: 1px solid #21262d; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .owasp-label { font-size: 9px; color: #484f58; text-transform: uppercase; letter-spacing: 0.06em; margin-right: 2px; }
  .otag { font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
  .otag.fail { background: #1c1210; color: #f85149; }
  .otag.partial { background: #1c1710; color: #d29922; }
  .otag.pass { background: #0d1c14; color: #3fb950; }
  .otag.na { background: #161b22; color: #484f58; }

  .events { flex: 1; overflow-y: auto; padding: 8px 16px; font-size: 12px; }
  .events .line { padding: 1px 0; white-space: pre-wrap; word-break: break-all; }
  .events .line.tool   { color: #79c0ff; }
  .events .line.meta   { color: #bc8cff; }
  .events .line.done   { color: #3fb950; font-weight: 600; }
  .events .line.error  { color: #f85149; }
  .events .line.stderr { color: #f85149; opacity: 0.7; }
  .events .line.result { color: #d29922; }
  .events .ts { color: #484f58; margin-right: 6px; font-size: 10px; }
  .events .empty { color: #484f58; font-size: 12px; line-height: 1.6; }
  .events .line.leaked {
    color: #fff; font-weight: 700; font-size: 13px;
    background: #28121580; padding: 6px 10px; border-radius: 4px; margin: 4px 0;
    border-left: 3px solid #f85149;
  }
  .events .line.blocked {
    color: #fff; font-weight: 700; font-size: 13px;
    background: #0d1c1480; padding: 6px 10px; border-radius: 4px; margin: 4px 0;
    border-left: 3px solid #3fb950;
  }

  .report { border-top: 1px solid #21262d; padding: 10px 16px; max-height: 25%; overflow-y: auto; background: #010409; }
  .report h3 { font-size: 10px; color: #484f58; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .report pre { font-size: 11px; white-space: pre-wrap; color: #8b949e; line-height: 1.5; }
  .report.has-data pre { color: #c9d1d9; }
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>Sandboxing Patterns for AI Runtimes</h1>
    <div class="tagline">Claude Agent SDK &middot; same prompt, three isolation levels</div>
  </div>
  <div class="secret-banner">Canary: <code>SECRET_DATABASE_PASSWORD=prod-db-hunter2</code></div>
  <button id="run-all" class="primary">Run All Three</button>
  <button id="clear">Clear</button>
</header>
<main id="cols"></main>

<script>
const PATTERNS = [
  {
    id: 'a',
    title: 'Pattern A',
    subtitle: 'No sandbox. Full env access.',
    file: 'agent-a.ts',
    diff: null,
    arch: 'graph LR\n  F["Fastify"] --> A["agent-a.ts"] --> T["Bash/Read/Write"]\n  S["SECRET_DB_PASS"] -.-> A\n  subgraph Docker["Docker Container"]\n    F\n    S\n    A\n    T\n  end',
    useCase: 'Raw query() with Bash/Read/Write. No sandbox, no custom MCP. The agent sees everything in env \u2014 including SECRET_DATABASE_PASSWORD.',
    owasp: [
      { id: 'LLM01', name: 'Prompt Injection', rating: 'fail' },
      { id: 'LLM02', name: 'Sensitive Info Disclosure', rating: 'fail' },
      { id: 'LLM03', name: 'Supply Chain', rating: 'partial' },
      { id: 'LLM04', name: 'Data and Model Poisoning', rating: 'fail' },
      { id: 'LLM05', name: 'Improper Output Handling', rating: 'fail' },
      { id: 'LLM06', name: 'Excessive Agency', rating: 'fail' },
      { id: 'LLM07', name: 'System Prompt Leakage', rating: 'fail' },
      { id: 'LLM08', name: 'Vector and Embedding Weaknesses', rating: 'na' },
      { id: 'LLM09', name: 'Misinformation', rating: 'na' },
      { id: 'LLM10', name: 'Unbounded Consumption', rating: 'partial' },
    ],
  },
  {
    id: 'b',
    title: 'Pattern B',
    subtitle: 'SDK sandbox + E2B microVM.',
    file: 'agent-b.ts',
    diff: { added: ['+sandbox:{enabled:true}', '+E2B MCP'], removed: ['-direct Bash'] },
    arch: 'graph LR\n  F["Fastify"] --> A["agent-b.ts"] --> SB["SDK Sandbox"] --> E["e2b_bash"]\n  S["SECRET_DB_PASS"] -.-> A\n  subgraph Docker["Docker Container"]\n    F\n    S\n    A\n    SB\n  end\n  subgraph E2B["E2B Firecracker VM"]\n    E\n  end',
    useCase: 'SDK sandbox restricts local bash. Code execution dispatched to E2B Firecracker microVM. Env still visible but code runs remotely.',
    owasp: [
      { id: 'LLM01', name: 'Prompt Injection', rating: 'fail' },
      { id: 'LLM02', name: 'Sensitive Info Disclosure', rating: 'fail' },
      { id: 'LLM03', name: 'Supply Chain', rating: 'partial' },
      { id: 'LLM04', name: 'Data and Model Poisoning', rating: 'partial' },
      { id: 'LLM05', name: 'Improper Output Handling', rating: 'partial' },
      { id: 'LLM06', name: 'Excessive Agency', rating: 'partial' },
      { id: 'LLM07', name: 'System Prompt Leakage', rating: 'partial' },
      { id: 'LLM08', name: 'Vector and Embedding Weaknesses', rating: 'na' },
      { id: 'LLM09', name: 'Misinformation', rating: 'na' },
      { id: 'LLM10', name: 'Unbounded Consumption', rating: 'partial' },
    ],
  },
  {
    id: 'c',
    title: 'Pattern C',
    subtitle: 'Entire agent inside microVM.',
    file: 'agent-c.ts',
    diff: { added: ['+sbx exec', '+SECRET blocked', '+own kernel'], removed: [] },
    arch: 'graph LR\n  F["Fastify"] --"sbx exec"--> A["agent-c.ts"] --> T["Bash/Read/Write"]\n  S["SECRET_DB_PASS"] --x A\n  subgraph Docker["Docker Container"]\n    F\n    S\n  end\n  subgraph SBX["sbx Firecracker VM"]\n    A\n    T\n  end',
    useCase: 'Identical code to agent-a.ts. Security is WHERE it runs \u2014 sbx exec launches it in a Firecracker microVM. SECRET never enters VM.',
    owasp: [
      { id: 'LLM01', name: 'Prompt Injection', rating: 'partial' },
      { id: 'LLM02', name: 'Sensitive Info Disclosure', rating: 'pass' },
      { id: 'LLM03', name: 'Supply Chain', rating: 'pass' },
      { id: 'LLM04', name: 'Data and Model Poisoning', rating: 'pass' },
      { id: 'LLM05', name: 'Improper Output Handling', rating: 'partial' },
      { id: 'LLM06', name: 'Excessive Agency', rating: 'pass' },
      { id: 'LLM07', name: 'System Prompt Leakage', rating: 'pass' },
      { id: 'LLM08', name: 'Vector and Embedding Weaknesses', rating: 'na' },
      { id: 'LLM09', name: 'Misinformation', rating: 'na' },
      { id: 'LLM10', name: 'Unbounded Consumption', rating: 'pass' },
    ],
  },
];

const cols = document.getElementById('cols');
const els = {};
let archOpen = true;

function init() {
  for (const p of PATTERNS) {
    const col = document.createElement('section');
    col.className = 'col';
    col.setAttribute('data-pattern', p.id);

    const diffHtml = p.diff ? `<div class="diff-summary">${p.diff.added.map(a => `<span class="added">${esc(a)}</span>`).join('  ')}${p.diff.removed.length ? '  ' + p.diff.removed.map(r => `<span class="removed">${esc(r)}</span>`).join('  ') : ''}</div>` : '';

    col.innerHTML = `
      <div class="col-head">
        <div class="top">
          <div class="info">
            <h2>${p.title}</h2>
            <div class="sub">${esc(p.subtitle)}</div>
            <span class="file">${esc(p.file)}</span>
          </div>
          <div class="controls">
            <span class="badge" data-role="badge">idle</span>
            <button data-role="run">Run</button>
          </div>
        </div>
      </div>
      <div class="arch-toggle" data-role="arch-toggle"><span class="arrow open" data-role="arrow">&#9654;</span> Architecture</div>
      <div class="arch-container" data-role="arch-container"><div class="arch-inner"><pre class="mermaid">${p.arch}</pre></div></div>
      ${diffHtml}
      <div class="owasp">
        <span class="owasp-label">OWASP</span>
        ${p.owasp.map(o => `<span class="otag ${o.rating}" data-id="${o.id}" title="${o.name}">${o.id} ${({fail:'\u2717',partial:'\u25b3',pass:'\u2713',na:'\u2014'})[o.rating]}</span>`).join('')}
      </div>
      <div class="events" data-role="events"><div class="empty">${esc(p.useCase)}</div></div>
      <div class="report empty" data-role="report"><h3>report-${p.id}.md</h3><pre data-role="report-body">\u2014 waiting for run \u2014</pre></div>
    `;
    cols.appendChild(col);
    els[p.id] = {
      badge: col.querySelector('[data-role=badge]'),
      runBtn: col.querySelector('[data-role=run]'),
      events: col.querySelector('[data-role=events]'),
      report: col.querySelector('[data-role=report]'),
      reportBody: col.querySelector('[data-role=report-body]'),
      archContainer: col.querySelector('[data-role=arch-container]'),
      archToggle: col.querySelector('[data-role=arch-toggle]'),
      arrow: col.querySelector('[data-role=arrow]'),
      eventCount: 0,
      useCase: p.useCase,
    };
    els[p.id].runBtn.addEventListener('click', () => run(p.id));
    els[p.id].archToggle.addEventListener('click', toggleArch);
  }

  document.getElementById('run-all').addEventListener('click', () => {
    fetch('/api/patterns/run-all', { method: 'POST' });
  });
  document.getElementById('clear').addEventListener('click', () => {
    for (const id of Object.keys(els)) {
      const e = els[id];
      e.events.innerHTML = `<div class="empty">${esc(e.useCase)}</div>`;
      e.eventCount = 0;
      e.reportBody.textContent = '\u2014 waiting for run \u2014';
      e.report.className = 'report empty';
      setBadge(id, 'idle');
    }
  });

  const es = new EventSource('/api/events');
  es.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    if (m.kind === 'hello') return;
    if (m.kind === 'status') return setBadge(m.pattern, m.value);
    if (m.kind === 'report') {
      const e = els[m.pattern];
      e.report.className = 'report has-data';
      e.reportBody.textContent = m.content;
      return;
    }
    if (m.kind === 'owasp') {
      updateOwaspBadges(m.pattern, m.results);
      return;
    }
    appendLine(m.pattern, m.kind, m.line, m.ts);
  };
  es.onerror = () => console.warn('SSE disconnected');
}

function toggleArch() {
  archOpen = !archOpen;
  for (const id of Object.keys(els)) {
    const e = els[id];
    e.archContainer.classList.toggle('collapsed', !archOpen);
    e.arrow.classList.toggle('open', archOpen);
  }
}

async function run(id) {
  const res = await fetch(`/api/patterns/${id}/run`, { method: 'POST' });
  if (!res.ok) {
    const j = await res.json().catch(() => ({}));
    appendLine(id, 'error', `[dashboard] ${j.reason || res.statusText}`);
  }
}

function setBadge(id, value) {
  const b = els[id].badge;
  b.className = `badge ${value === 'idle' ? '' : value}`;
  b.textContent = value;
  els[id].runBtn.disabled = value === 'running';
}

function appendLine(id, kind, line, ts) {
  const e = els[id];
  if (e.eventCount === 0) e.events.innerHTML = '';
  e.eventCount += 1;
  const div = document.createElement('div');
  let extra = '';
  if (/LEAKED/i.test(line)) extra = ' leaked';
  else if (/BLOCKED/i.test(line)) extra = ' blocked';
  div.className = `line ${kind}${extra}`;
  const stamp = ts ? new Date(ts).toTimeString().slice(0, 8) : '';
  div.innerHTML = `<span class="ts">${stamp}</span>${esc(line)}`;
  e.events.appendChild(div);
  e.events.scrollTop = e.events.scrollHeight;
}

function updateOwaspBadges(patternId, results) {
  const col = document.querySelector(`.col[data-pattern="${patternId}"]`);
  if (!col) return;
  const owaspDiv = col.querySelector('.owasp');
  if (!owaspDiv) return;
  const icons = { fail: '\u2717', partial: '\u25b3', pass: '\u2713', na: '\u2014' };
  for (const r of results) {
    const tag = owaspDiv.querySelector(`.otag[data-id="${r.id}"]`);
    if (tag) {
      tag.className = `otag ${r.result}`;
      tag.textContent = `${r.id} ${icons[r.result] || '?'}`;
      tag.title = `${r.name}: ${r.evidence || ''}`;
    }
  }
  appendLine(patternId, 'result', `[owasp] ${results.filter(r=>r.result==='pass').length}/10 passed, ${results.filter(r=>r.result==='fail').length}/10 failed`);
}

function esc(s) {
  return String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
}

init();
mermaid.run({ querySelector: '.mermaid' });
</script>
</body>
</html>
