<!doctype html>
<html lang="en" data-theme="system">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- Inline theme init: read localStorage before first paint to prevent flash of wrong theme -->
<script>
  (function () {
    var saved = localStorage.getItem('theme');
    var valid = ['system', 'light', 'dark'];
    document.documentElement.setAttribute(
      'data-theme',
      valid.includes(saved) ? saved : 'system'
    );
  })();
</script>
<title>Sandboxing Patterns for AI Runtimes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>mermaid.initialize({ startOnLoad: false, theme: 'dark', themeVariables: { primaryColor: '#1e2530', primaryTextColor: '#c8cdd5', primaryBorderColor: '#2e3640', lineColor: '#4a5568', fontSize: '11px', fontFamily: 'JetBrains Mono, SF Mono, Menlo, monospace' } });</script>
<style>
  /* ─── Design Tokens ────────────────────────────────────────────────── */
  :root {
    --bg:            #0d1117;
    --surface:       #161b22;
    --surface-2:     #21262d;
    --border:        #30363d;
    --border-subtle: #21262d;
    --text:          #e6edf3;
    --text-muted:    #8b949e;
    --text-dim:      #484f58;
    --blue:          #58a6ff;
    --red:           #f85149;
    --amber:         #d29922;
    --green:         #3fb950;
    --purple:        #bc8cff;

    --accent-a:      #f85149;
    --accent-b:      #d29922;
    --accent-c:      #3fb950;

    --font-sans:     'Inter', system-ui, -apple-system, sans-serif;
    --font-mono:     'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;

    --radius-sm:     4px;
    --radius-md:     6px;
    --radius-lg:     10px;
    --radius-pill:   999px;
    --transition:    150ms ease;
    --header-h:      56px;
  }

  /* ─── Explicit Dark Override ────────────────────────────────────────────────── */
  :root[data-theme="dark"] {
    --bg:            #0d1117;
    --surface:       #161b22;
    --surface-2:     #21262d;
    --border:        #30363d;
    --border-subtle: #21262d;
    --text:          #e6edf3;
    --text-muted:    #8b949e;
    --text-dim:      #484f58;
  }

  /* ─── Light Theme ────────────────────────────────────────────────────────── */
  :root[data-theme="light"] {
    --bg:            #ffffff;
    --surface:       #f6f8fa;
    --surface-2:     #eaeef2;
    --border:        #d0d7de;
    --border-subtle: #eaeef2;
    --text:          #1f2328;
    --text-muted:    #636c76;
    --text-dim:      #8c959f;
  }

  /* ─── System: apply light tokens when OS is light + theme=system ───────────────── */
  @media (prefers-color-scheme: light) {
    :root[data-theme="system"] {
      --bg:            #ffffff;
      --surface:       #f6f8fa;
      --surface-2:     #eaeef2;
      --border:        #d0d7de;
      --border-subtle: #eaeef2;
      --text:          #1f2328;
      --text-muted:    #636c76;
      --text-dim:      #8c959f;
    }
  }

  /* ─── Reset ───────────────────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Scrollbars ─────────────────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--radius-pill); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* ─── Header ───────────────────────────────────────────────────────────────────── */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 12px;
    height: var(--header-h);
    padding: 0 20px;
    background: color-mix(in srgb, var(--bg) 90%, transparent);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border-subtle);
  }

  .brand { flex: 1; min-width: 0; }
  .brand h1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .brand .tagline {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
    font-family: var(--font-mono);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Canary secret pill */
  .secret-banner {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-family: var(--font-mono);
    padding: 5px 10px 5px 8px;
    border-radius: var(--radius-md);
    background: color-mix(in srgb, var(--red) 8%, var(--surface));
    border: 1px solid color-mix(in srgb, var(--red) 30%, var(--border));
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .secret-banner::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--red);
    animation: dot-pulse 2s ease-in-out infinite;
  }
  .secret-banner code {
    color: var(--amber);
    font-weight: 500;
  }
  @keyframes dot-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ─── Buttons ────────────────────────────────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    cursor: pointer;
    transition: background var(--transition), border-color var(--transition), box-shadow var(--transition), opacity var(--transition);
    white-space: nowrap;
    flex-shrink: 0;
    line-height: 1;
  }
  .btn:hover:not(:disabled) {
    background: color-mix(in srgb, var(--surface-2) 70%, var(--border));
    border-color: var(--blue);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--blue) 12%, transparent);
  }
  .btn:focus-visible {
    outline: 2px solid var(--blue);
    outline-offset: 2px;
  }
  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .btn-primary {
    background: #238636;
    color: #fff;
    border-color: #2ea043;
    font-weight: 600;
  }
  .btn-primary:hover:not(:disabled) {
    background: #2ea043;
    border-color: #3fb950;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--green) 15%, transparent);
  }

  /* Legacy button selector — keep for JS-generated html compatibility */
  button { all: unset; }

  .header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  /* ─── Theme Toggle ───────────────────────────────────────────────────────────────── */
  #theme-toggle {
    min-width: 82px;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.02em;
  }

  /* ─── Layout ───────────────────────────────────────────────────────────────────── */
  main {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border-subtle);
    height: calc(100vh - var(--header-h));
    overflow: hidden;
  }

  /* ─── Pattern Column Card ──────────────────────────────────────────────────────── */
  .col {
    background: var(--surface);
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
    border-top: 3px solid var(--border);
    transition: border-top-color var(--transition);
  }
  .col[data-pattern="a"] { border-top-color: var(--accent-a); }
  .col[data-pattern="b"] { border-top-color: var(--accent-b); }
  .col[data-pattern="c"] { border-top-color: var(--accent-c); }

  /* ─── Column Header ─────────────────────────────────────────────────────────────── */
  .col-head {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .col-head .top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .col-head .info { flex: 1; min-width: 0; }
  .col-head h2 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .col-head .sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
    line-height: 1.4;
  }
  .file-badge {
    display: inline-block;
    margin-top: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--blue);
    background: color-mix(in srgb, var(--blue) 8%, var(--bg));
    border: 1px solid color-mix(in srgb, var(--blue) 20%, var(--border));
    border-radius: var(--radius-sm);
    padding: 2px 7px;
    line-height: 1.5;
  }
  .col-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    padding-top: 2px;
  }

  /* ─── Status Badge ────────────────────────────────────────────────────────────────── */
  .badge {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 9px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: var(--surface-2);
    transition: color var(--transition), border-color var(--transition), background var(--transition);
    white-space: nowrap;
  }
  .badge.running {
    color: var(--blue);
    border-color: color-mix(in srgb, var(--blue) 50%, var(--border));
    background: color-mix(in srgb, var(--blue) 8%, var(--surface-2));
    animation: badge-pulse 1.4s ease-in-out infinite;
  }
  .badge.done {
    color: var(--green);
    border-color: color-mix(in srgb, var(--green) 50%, var(--border));
    background: color-mix(in srgb, var(--green) 8%, var(--surface-2));
  }
  .badge.error {
    color: var(--red);
    border-color: color-mix(in srgb, var(--red) 50%, var(--border));
    background: color-mix(in srgb, var(--red) 8%, var(--surface-2));
  }
  @keyframes badge-pulse { 50% { opacity: 0.45; } }

  /* ─── Architecture Toggle ────────────────────────────────────────────────────────────── */
  .arch-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    user-select: none;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: color var(--transition), background var(--transition);
    flex-shrink: 0;
  }
  .arch-toggle:hover { color: var(--text-muted); background: color-mix(in srgb, var(--surface-2) 50%, transparent); }
  .arch-toggle:focus-visible { outline: 2px solid var(--blue); outline-offset: -2px; }
  .arch-arrow {
    font-size: 9px;
    transition: transform 200ms ease;
    color: var(--text-dim);
  }
  .arch-arrow.open { transform: rotate(90deg); }

  .arch-container {
    overflow: hidden;
    transition: max-height 280ms cubic-bezier(0.4, 0, 0.2, 1);
    border-bottom: 1px solid var(--border-subtle);
    background: var(--bg);
    flex-shrink: 0;
  }
  .arch-container.collapsed { max-height: 0 !important; border-bottom: none; }
  .arch-container .arch-inner {
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 14px;
    overflow: hidden;
    /* clickable affordance for modal trigger */
    cursor: pointer;
    position: relative;
  }
  .arch-container .arch-inner svg { max-width: 100%; max-height: 100%; }

  /* Expand glyph — appears on hover to signal the diagram is clickable */
  .arch-container .arch-inner:hover::after {
    content: '⤢';
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 13px;
    color: var(--text-muted);
    opacity: 0.85;
    pointer-events: none;
    line-height: 1;
  }
  .arch-container .arch-inner:focus-visible {
    outline: 2px solid var(--blue);
    outline-offset: -2px;
  }

  /* ─── Diagram Modal ─────────────────────────────────────────────────── */
  #diagram-modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #diagram-modal[hidden] { display: none; }

  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(13, 17, 23, 0.85);
    backdrop-filter: blur(3px);
  }
  .modal-card {
    position: relative;
    z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    display: flex;
    flex-direction: column;
    width: min(90vw, 1100px);
    max-height: 88vh;
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .modal-title {
    font-size: 12px;
    font-weight: 600;
    font-family: var(--font-mono);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  #modal-close {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    padding: 0;
    font-size: 18px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-muted);
    cursor: pointer;
    line-height: 1;
    transition: background var(--transition), border-color var(--transition),
                box-shadow var(--transition), color var(--transition);
    flex-shrink: 0;
  }
  #modal-close:hover {
    background: color-mix(in srgb, var(--surface-2) 70%, var(--border));
    border-color: var(--blue);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--blue) 12%, transparent);
    color: var(--text);
  }
  #modal-close:focus-visible {
    outline: 2px solid var(--blue);
    outline-offset: 2px;
  }
  .modal-body {
    flex: 1;
    overflow: auto;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  .mermaid-zoom {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mermaid-zoom svg {
    max-width: 100%;
    max-height: 70vh;
    width: auto;
    height: auto;
  }

  /* ─── Diff Summary ───────────────────────────────────────────────────────────────── */
  .diff-summary {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    padding: 6px 16px;
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .diff-pill {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: var(--radius-sm);
  }
  .diff-pill.added {
    color: var(--green);
    background: color-mix(in srgb, var(--green) 10%, var(--bg));
    border: 1px solid color-mix(in srgb, var(--green) 20%, var(--border));
  }
  .diff-pill.removed {
    color: var(--red);
    background: color-mix(in srgb, var(--red) 10%, var(--bg));
    border: 1px solid color-mix(in srgb, var(--red) 20%, var(--border));
  }

  /* ─── OWASP Row ──────────────────────────────────────────────────────────────────── */
  .owasp {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .owasp-label {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-right: 2px;
    flex-shrink: 0;
  }
  .otag {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    cursor: default;
    transition: opacity var(--transition);
  }
  .otag:hover { opacity: 0.85; }
  .otag.fail {
    background: color-mix(in srgb, var(--red) 12%, var(--bg));
    color: var(--red);
    border-color: color-mix(in srgb, var(--red) 25%, var(--border));
  }
  .otag.partial {
    background: color-mix(in srgb, var(--amber) 12%, var(--bg));
    color: var(--amber);
    border-color: color-mix(in srgb, var(--amber) 25%, var(--border));
  }
  .otag.pass {
    background: color-mix(in srgb, var(--green) 12%, var(--bg));
    color: var(--green);
    border-color: color-mix(in srgb, var(--green) 25%, var(--border));
  }
  .otag.na {
    background: var(--bg);
    color: var(--text-dim);
    border-color: var(--border-subtle);
  }

  /* ─── Events Log ──────────────────────────────────────────────────────────────────── */
  .events {
    flex: 1;
    overflow-y: auto;
    padding: 10px 16px;
    font-family: var(--font-mono);
    font-size: 11.5px;
    line-height: 1.65;
    min-height: 0;
  }
  .events .line { padding: 0; white-space: pre-wrap; word-break: break-all; }
  .events .line.tool   { color: #79c0ff; }
  .events .line.meta   { color: var(--purple); }
  .events .line.done   { color: var(--green); font-weight: 600; }
  .events .line.error  { color: var(--red); }
  .events .line.stderr { color: color-mix(in srgb, var(--red) 70%, transparent); }
  .events .line.result { color: var(--amber); }
  .events .line.stdout { color: var(--text-muted); }
  .events .ts {
    color: var(--text-dim);
    margin-right: 8px;
    font-size: 10px;
    opacity: 0.6;
    user-select: none;
  }
  .events .empty {
    color: var(--text-dim);
    font-size: 11.5px;
    font-family: var(--font-mono);
    line-height: 1.7;
    padding: 4px 0;
  }

  /* LEAKED / BLOCKED highlight lines */
  .events .line.leaked {
    color: #ffd7d5;
    font-weight: 600;
    background: color-mix(in srgb, var(--red) 14%, var(--bg));
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    margin: 3px 0;
    border-left: 3px solid var(--red);
  }
  .events .line.blocked {
    color: #d2fedb;
    font-weight: 600;
    background: color-mix(in srgb, var(--green) 10%, var(--bg));
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    margin: 3px 0;
    border-left: 3px solid var(--green);
  }

  /* ─── Report Panel ──────────────────────────────────────────────────────────────────── */
  .report {
    flex-shrink: 0;
    border-top: 1px dashed var(--border-subtle);
    padding: 10px 16px 12px;
    max-height: 26%;
    overflow-y: auto;
    background: var(--bg);
    transition: border-color var(--transition);
  }
  .report.has-data {
    border-top-color: var(--border);
    border-top-style: solid;
  }
  .report h3 {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 7px;
  }
  .report pre {
    font-family: var(--font-mono);
    font-size: 11px;
    white-space: pre-wrap;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .report.has-data pre { color: var(--text-muted); }
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>Sandboxing Patterns for AI Runtimes</h1>
    <div class="tagline">Claude Agent SDK &middot; same prompt, three isolation levels</div>
  </div>
  <div class="secret-banner">Canary: <code>SECRET_DATABASE_PASSWORD=prod-db-hunter2</code></div>
  <div class="header-actions">
    <button id="theme-toggle" class="btn" aria-label="Current theme: System. Click to switch to Light.">System ⊙</button>
    <button id="run-all" class="btn btn-primary">Run All Three</button>
    <button id="clear" class="btn">Clear</button>
  </div>
</header>
<main id="cols"></main>

<!-- ─── Diagram Modal ─────────────────────────────────────────────────────── -->
<div id="diagram-modal" role="dialog" aria-modal="true" aria-label="Architecture diagram" hidden>
  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal-card">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Architecture</span>
      <button id="modal-close" aria-label="Close diagram">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="mermaid-zoom" id="mermaid-zoom"></div>
    </div>
  </div>
</div>

<script>
const PATTERNS = [
  {
    id: 'a',
    title: 'Pattern A',
    subtitle: 'No sandbox. Full env access.',
    file: 'agent-a.ts',
    diff: null,

const cols = document.getElementById('cols');
const els = {};
let archOpen = true;

function init() {
  for (const p of PATTERNS) {
    const col = document.createElement('section');
    col.className = 'col';
    col.setAttribute('data-pattern', p.id);

    const diffHtml = p.diff
      ? `<div class="diff-summary">${
          p.diff.added.map(a => `<span class="diff-pill added">${esc(a)}</span>`).join('')
        }${
          p.diff.removed.length ? p.diff.removed.map(r => `<span class="diff-pill removed">${esc(r)}</span>`).join('') : ''
        }</div>`
      : '';

    const owaspIcons = { fail: '✗', partial: '△', pass: '✓', na: '—' };

    col.innerHTML = `
      <div class="col-head">
        <div class="top">
          <div class="info">
            <h2>${esc(p.title)}</h2>
            <div class="sub">${esc(p.subtitle)}</div>
            <span class="file-badge">${esc(p.file)}</span>
          </div>
          <div class="col-controls">
            <span class="badge" data-role="badge">idle</span>
            <button class="btn" data-role="run">Run</button>
          </div>
        </div>
      </div>
      <div class="arch-toggle" data-role="arch-toggle" tabindex="0" role="button" aria-expanded="true">
        <span class="arch-arrow open" data-role="arrow">&#9654;</span>
        Architecture
      </div>
      <div class="arch-container" data-role="arch-container">
        <div class="arch-inner"><pre class="mermaid" data-arch-src="${esc(p.arch)}">${p.arch}</pre></div>
      </div>
      ${diffHtml}
      <div class="owasp">
        <span class="owasp-label">OWASP</span>
        ${p.owasp.map(o => `<span class="otag ${o.rating}" data-id="${o.id}" title="${esc(o.name)}: ${o.rating}">${esc(o.id)} ${owaspIcons[o.rating] || '?'}</span>`).join('')}
      </div>
      <div class="events" data-role="events"><div class="empty">${esc(p.useCase)}</div></div>
      <div class="report" data-role="report">
        <h3>report-${esc(p.id)}.md</h3>
        <pre data-role="report-body">— waiting for run —</pre>
      </div>
    `;

    cols.appendChild(col);

    els[p.id] = {
      badge: col.querySelector('[data-role=badge]'),
      runBtn: col.querySelector('[data-role=run]'),
      events: col.querySelector('[data-role=events]'),
      report: col.querySelector('[data-role=report]'),
      reportBody: col.querySelector('[data-role=report-body]'),
      archContainer: col.querySelector('[data-role=arch-container]'),
      archToggle: col.querySelector('[data-role=arch-toggle]'),
      arrow: col.querySelector('[data-role=arrow]'),
      eventCount: 0,
      useCase: p.useCase,
    };

    els[p.id].runBtn.addEventListener('click', () => run(p.id));
    els[p.id].archToggle.addEventListener('click', toggleArch);
    els[p.id].archToggle.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleArch(); }
    });

    // Wire arch-inner as a clickable modal trigger
    const archInner = col.querySelector('.arch-inner');
    archInner.setAttribute('tabindex', '0');
    archInner.setAttribute('role', 'button');
    archInner.setAttribute('aria-label', `Open ${p.title} architecture diagram in modal`);
    archInner.addEventListener('click', () => openDiagramModal(archInner, p.title));
    archInner.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDiagramModal(archInner, p.title); }
    });
  }

  document.getElementById('run-all').addEventListener('click', () => {
    fetch('/api/patterns/run-all', { method: 'POST' });
  });

  document.getElementById('clear').addEventListener('click', () => {
    for (const id of Object.keys(els)) {
      const e = els[id];
      e.events.innerHTML = `<div class="empty">${esc(e.useCase)}</div>`;
      e.eventCount = 0;
      e.reportBody.textContent = '— waiting for run —';
      e.report.className = 'report';
      setBadge(id, 'idle');
    }
  });

  const es = new EventSource('/api/events');
  es.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    if (m.kind === 'hello') return;
    if (m.kind === 'status') return setBadge(m.pattern, m.value);
    if (m.kind === 'report') {
      const e = els[m.pattern];
      e.report.className = 'report has-data';
      e.reportBody.textContent = m.content;
      return;
    }
    if (m.kind === 'owasp') {
      updateOwaspBadges(m.pattern, m.results);
      return;
    }
    appendLine(m.pattern, m.kind, m.line, m.ts);
  };
  es.onerror = () => console.warn('SSE disconnected');
}

function toggleArch() {
  archOpen = !archOpen;
  for (const id of Object.keys(els)) {
    const e = els[id];
    e.archContainer.classList.toggle('collapsed', !archOpen);
    e.arrow.classList.toggle('open', archOpen);
    e.archToggle.setAttribute('aria-expanded', String(archOpen));
  }
}

async function run(id) {
  const res = await fetch(`/api/patterns/${id}/run`, { method: 'POST' });
  if (!res.ok) {
    const j = await res.json().catch(() => ({}));
    appendLine(id, 'error', `[dashboard] ${j.reason || res.statusText}`);
  }
}

function setBadge(id, value) {
  const b = els[id].badge;
  b.className = `badge ${value === 'idle' ? '' : value}`.trim();
  b.textContent = value;
  els[id].runBtn.disabled = value === 'running';
}

function appendLine(id, kind, line, ts) {
  const e = els[id];
  if (e.eventCount === 0) e.events.innerHTML = '';
  e.eventCount += 1;
  const div = document.createElement('div');
  let extra = '';
  if (/LEAKED/i.test(line)) extra = ' leaked';
  else if (/BLOCKED/i.test(line)) extra = ' blocked';
  div.className = `line ${kind}${extra}`;
  const stamp = ts ? new Date(ts).toTimeString().slice(0, 8) : '';
  div.innerHTML = `<span class="ts">${stamp}</span>${esc(line)}`;
  e.events.appendChild(div);
  e.events.scrollTop = e.events.scrollHeight;
}

function updateOwaspBadges(patternId, results) {
  const col = document.querySelector(`.col[data-pattern="${patternId}"]`);
  if (!col) return;
  const owaspDiv = col.querySelector('.owasp');
  if (!owaspDiv) return;
  const icons = { fail: '✗', partial: '△', pass: '✓', na: '—' };
  for (const r of results) {
    const tag = owaspDiv.querySelector(`.otag[data-id="${r.id}"]`);
    if (tag) {
      tag.className = `otag ${r.result}`;
      tag.textContent = `${r.id} ${icons[r.result] || '?'}`;
      tag.title = `${r.name}: ${r.evidence || ''}`;
    }
  }
  appendLine(patternId, 'result', `[owasp] ${results.filter(r=>r.result==='pass').length}/10 passed, ${results.filter(r=>r.result==='fail').length}/10 failed`);
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

init();
mermaid.run({ querySelector: '.mermaid' });

/* ─── Theme Toggle Logic ─────────────────────────────────────────────────────────────────────
 * Three states: system → light → dark → system (cycles on each click).
 * Persisted in localStorage under key "theme".
 * Mermaid is re-initialised on every theme change to match the new palette.
 * ─────────────────────────────────────────────────────────────────────────── */

/** @type {Record<string, {label: string, next: string, ariaNext: string}>} */
const THEME_META = {
  system: { label: 'System ⊙', next: 'light', ariaNext: 'Current theme: System. Click to switch to Light.' },
  light:  { label: 'Light ☀',  next: 'dark',  ariaNext: 'Current theme: Light. Click to switch to Dark.'  },
  dark:   { label: 'Dark ☾',   next: 'system', ariaNext: 'Current theme: Dark. Click to switch to System.' },
};

/**
 * Resolve the effective Mermaid theme for a given data-theme value.
 * "system" defers to the OS; if the OS is dark (or we can't tell), use 'dark'.
 * @param {string} theme - One of 'system' | 'light' | 'dark'
 * @returns {'dark' | 'default'}
 */
function resolveMermaidTheme(theme) {
  if (theme === 'light') return 'default';
  if (theme === 'dark')  return 'dark';
  // system — check OS preference
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'default' : 'dark';
}

/**
 * Re-initialise Mermaid with the correct palette and re-render all diagrams.
 * @param {string} theme - One of 'system' | 'light' | 'dark'
 */
function rerenderMermaid(theme) {
  const mTheme = resolveMermaidTheme(theme);
  const themeVars =
    mTheme === 'dark'
      ? { primaryColor: '#1e2530', primaryTextColor: '#c8cdd5', primaryBorderColor: '#2e3640',
          lineColor: '#4a5568', fontSize: '11px', fontFamily: 'JetBrains Mono, SF Mono, Menlo, monospace' }
      : { primaryColor: '#dbeafe', primaryTextColor: '#1f2328', primaryBorderColor: '#d0d7de',
          lineColor: '#636c76', fontSize: '11px', fontFamily: 'JetBrains Mono, SF Mono, Menlo, monospace' };

  mermaid.initialize({ startOnLoad: false, theme: mTheme, themeVariables: themeVars });

  // Re-render: reset each diagram's SVG so mermaid.run() processes it fresh.
  // Use data-arch-src (set at element creation) as the authoritative source —
  // avoids a race with mermaid v11 which sets its own data-mermaid-src attribute
  // synchronously on the first element before yielding back to calling code.
  document.querySelectorAll('.mermaid').forEach((el) => {
    const src = el.getAttribute('data-arch-src') || '';
    if (!src) return; // skip elements without a known source
    el.removeAttribute('data-processed');
    el.textContent = src; // use textContent (not innerHTML) to avoid HTML-encoding issues
  });
  mermaid.run({ querySelector: '.mermaid' });
}

/**
 * Apply a theme: set data-theme attribute, update button, persist to localStorage.
 * @param {string} theme - One of 'system' | 'light' | 'dark'
 */
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  const meta = THEME_META[theme] || THEME_META['system'];
  const btn = document.getElementById('theme-toggle');
  if (btn) {
    btn.textContent = meta.label;
    btn.setAttribute('aria-label', meta.ariaNext);
  }
  rerenderMermaid(theme);
}

/** Initialise the theme toggle — called once after DOM is ready. */
function initTheme() {
  const saved = localStorage.getItem('theme');
  const initial = ['system', 'light', 'dark'].includes(saved) ? saved : 'system';
  applyTheme(initial);

  const btn = document.getElementById('theme-toggle');
  if (!btn) return;
  btn.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme') || 'system';
    const next = (THEME_META[current] || THEME_META['system']).next;
    applyTheme(next);
  });
}

initTheme();

/* ─── Diagram Modal Logic ─────────────────────────────────────────────────
 * Opens the clicked .arch-inner mermaid SVG in a full-size modal dialog.
 * Close triggers: close button, backdrop click, Escape key.
 * ───────────────────────────────────────────────────────────────────────── */

/** @type {HTMLElement|null} The .arch-inner element that triggered the modal */
let _modalTrigger = null;

/**
 * Open the diagram modal showing the Mermaid SVG from `archInner`.
 * @param {HTMLElement} archInner - The .arch-inner element containing the rendered SVG
 * @param {string} patternTitle - The pattern title shown in the modal header
 */
function openDiagramModal(archInner, patternTitle) {
  const svgEl = archInner.querySelector('svg');
  if (!svgEl) return;

  // Clone the SVG and strip fixed dimensions so CSS can scale it freely via viewBox
  const clone = /** @type {SVGElement} */ (svgEl.cloneNode(true));
  clone.removeAttribute('width');
  clone.removeAttribute('height');

  const zoom = document.getElementById('mermaid-zoom');
  zoom.innerHTML = '';
  zoom.appendChild(clone);

  document.getElementById('modal-title').textContent = 'Architecture — ' + patternTitle;
  const modal = document.getElementById('diagram-modal');
  modal.removeAttribute('hidden');
  modal.setAttribute('aria-label', 'Architecture diagram for ' + patternTitle);

  document.body.style.overflow = 'hidden';
  _modalTrigger = archInner;
  document.getElementById('modal-close').focus();
}

/** Close the diagram modal and restore focus to the trigger element. */
function closeDiagramModal() {
  const modal = document.getElementById('diagram-modal');
  modal.setAttribute('hidden', '');
  document.getElementById('mermaid-zoom').innerHTML = '';
  document.body.style.overflow = '';
  if (_modalTrigger) {
    _modalTrigger.focus();
    _modalTrigger = null;
  }
}

// Modal close button
document.getElementById('modal-close').addEventListener('click', closeDiagramModal);

// Backdrop click to close (click lands on the backdrop, not the card)
document.getElementById('modal-backdrop').addEventListener('click', closeDiagramModal);

// Escape key to close
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && !document.getElementById('diagram-modal').hasAttribute('hidden')) {
    closeDiagramModal();
  }
});
</script>
